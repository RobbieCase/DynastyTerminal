<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Dynasty Terminal</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
<style>
  :root{
    --ink:#0E1116; --panel:#161B22; --panel2:#1B212A; --line:#232A33; --line2:#2E3742;
    --tx:#E6EAF0; --mut:#8B96A5; --faint:#5B6675;
    --wr:#2DD4A7; --rb:#8BD450; --qb:#4DA3FF; --te:#F0A94B; --pick:#B98BFF;
    --buy:#2DD4A7; --sell:#F2647A; --warn:#F0A94B;
    --mono:'JetBrains Mono',ui-monospace,monospace; --sans:'Inter',system-ui,sans-serif;
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--ink);color:var(--tx);font-family:var(--sans);font-size:14px;-webkit-font-smoothing:antialiased}
  a{color:inherit}
  ::selection{background:rgba(45,212,167,.3)}
  .wrap{max-width:1180px;margin:0 auto;padding:14px}
  .mono{font-family:var(--mono)}
  .mut{color:var(--mut)} .faint{color:var(--faint)}
  .lbl{font-family:var(--mono);font-size:11px;letter-spacing:.04em;color:var(--faint);text-transform:lowercase}
  .panel{background:var(--panel);border:1px solid var(--line);border-radius:10px}
  .pad{padding:14px 16px}
  /* command bar */
  .cmd{display:flex;align-items:center;gap:10px;background:var(--panel);border:1px solid var(--line2);border-radius:10px;padding:10px 12px;position:relative}
  .cmd .prompt{color:var(--wr);font-family:var(--mono);font-weight:700}
  .cmd input{flex:1;background:transparent;border:0;outline:0;color:var(--tx);font-family:var(--mono);font-size:15px;min-width:60px}
  .cmd input::placeholder{color:var(--faint)}
  .blink{width:8px;height:17px;background:var(--wr);animation:bl 1.1s steps(1) infinite}
  @keyframes bl{50%{opacity:0}}
  .drop{position:absolute;top:calc(100% + 6px);left:0;right:0;background:var(--panel2);border:1px solid var(--line2);border-radius:10px;z-index:30;overflow:hidden;max-height:320px;overflow-y:auto}
  .opt{display:flex;align-items:center;gap:10px;padding:9px 12px;cursor:pointer;border-bottom:1px solid var(--line)}
  .opt:hover{background:#222A34}
  .pos{font-family:var(--mono);font-weight:700;font-size:11px;border-radius:5px;padding:2px 6px}
  .tabs{display:flex;gap:6px;flex-wrap:wrap;margin-top:10px}
  .tab{font-family:var(--mono);font-size:12px;color:var(--mut);background:var(--panel);border:1px solid var(--line);border-radius:7px;padding:6px 11px;cursor:pointer;user-select:none}
  .tab b{color:var(--tx);font-weight:500}
  .tab.on{border-color:var(--wr);color:var(--tx)} .tab.on b{color:var(--wr)}
  .tab:hover{border-color:var(--line2)}
  /* wire */
  .wire{display:flex;align-items:center;gap:14px;margin-top:10px;background:var(--panel);border:1px solid var(--line);border-radius:8px;padding:8px 12px;overflow:hidden}
  .wdot{width:7px;height:7px;border-radius:50%;background:var(--buy);flex:none;box-shadow:0 0 0 0 rgba(45,212,167,.5);animation:pulse 2s infinite}
  @keyframes pulse{70%{box-shadow:0 0 0 6px rgba(45,212,167,0)}}
  .wtrack{display:flex;gap:26px;white-space:nowrap;animation:marq 38s linear infinite}
  .wire:hover .wtrack{animation-play-state:paused}
  @keyframes marq{from{transform:translateX(0)}to{transform:translateX(-50%)}}
  .witem{font-family:var(--mono);font-size:12px;color:var(--mut)}
  .witem b{color:var(--tx);font-weight:500}
  /* grid */
  .row{display:grid;gap:12px;margin-top:12px}
  .metric{background:var(--panel2);border-radius:8px;padding:11px 13px}
  .metric .v{font-family:var(--mono);font-size:22px;font-weight:500;margin-top:3px}
  .bar{height:7px;background:#0E141B;border-radius:4px;overflow:hidden}
  .bar>div{height:100%}
  .seg{display:flex;align-items:center;gap:9px;margin-bottom:8px}
  .seg .nm{font-family:var(--mono);font-size:11px;color:var(--faint);width:54px}
  .seg .vn{font-family:var(--mono);font-size:12px;width:30px;text-align:right;color:var(--tx)}
  .chip{font-family:var(--mono);font-size:11px;border-radius:6px;padding:3px 8px;background:var(--panel2);color:var(--mut)}
  .stub{border:1px dashed var(--line2);border-radius:8px;padding:13px;color:var(--faint);font-family:var(--mono);font-size:12px;line-height:1.6}
  .stub b{color:var(--mut);font-weight:500}
  .btn{font-family:var(--mono);font-size:13px;color:var(--tx);background:var(--panel2);border:1px solid var(--line2);border-radius:8px;padding:9px 14px;cursor:pointer}
  .btn:hover{border-color:var(--wr)}
  .field{background:transparent;border:1px solid var(--line2);border-radius:8px;color:var(--tx);font-family:var(--mono);padding:9px 11px;outline:0}
  .field:focus{border-color:var(--wr)}
  .teamcard{display:flex;align-items:center;gap:12px;background:var(--panel);border:1px solid var(--line);border-radius:9px;padding:11px 13px;cursor:pointer}
  .teamcard:hover{border-color:var(--line2)}
  .rk{font-family:var(--mono);font-size:13px;color:var(--faint);width:24px}
  .selset{display:flex;gap:7px;flex-wrap:wrap;align-items:center;margin-top:12px}
  .toggle{font-family:var(--mono);font-size:12px;color:var(--mut);background:var(--panel);border:1px solid var(--line);border-radius:7px;padding:6px 10px;cursor:pointer}
  .toggle.on{border-color:var(--wr);color:var(--tx)}
  .head{display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap}
  .h1{font-size:24px;font-weight:600;letter-spacing:-.01em}
  .small{font-size:12px}
  .note{font-family:var(--mono);font-size:11px;color:var(--faint);margin-top:8px;line-height:1.6}
  .err{color:var(--sell);font-family:var(--mono);font-size:12px}
  .ok{color:var(--buy)}
  .tip{position:relative;border-bottom:1px dotted var(--faint);cursor:help}
  .tip .tipbox{display:none;position:absolute;bottom:135%;left:0;width:250px;background:var(--panel2);border:1px solid var(--line2);border-radius:8px;padding:10px 12px;font-family:var(--sans);font-size:12px;color:var(--tx);line-height:1.55;z-index:60}
  .tip:hover .tipbox{display:block}
  .gloss{display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:10px;margin-top:12px}
  .gcard{background:var(--panel);border:1px solid var(--line);border-radius:9px;padding:11px 13px}
  .gcard .t{font-family:var(--mono);font-size:12px;color:var(--wr);margin-bottom:4px}
  .gcard .d{font-size:12px;color:var(--mut);line-height:1.55}
  @media(max-width:760px){.h1{font-size:20px}}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useEffect,useRef,useMemo} = React;
const SLEEP="https://api.sleeper.app/v1";
const POS={QB:"var(--qb)",RB:"var(--rb)",WR:"var(--wr)",TE:"var(--te)"};
const posBg=p=>({QB:"rgba(77,163,255,.15)",RB:"rgba(139,212,80,.15)",WR:"rgba(45,212,167,.15)",TE:"rgba(240,169,75,.15)"}[p]||"rgba(139,150,165,.15)");

async function jget(u){const r=await fetch(u);if(!r.ok)throw new Error(r.status);return r.json();}
function ageFrom(bd){if(!bd)return null;const d=new Date(bd);if(isNaN(d))return null;return (Date.now()-d.getTime())/(365.25*864e5);}
function ageMult(pos,a){
  if(a==null)return 1;
  if(pos==="WR"){if(a<25)return 1.04;if(a<27.5)return 1.01;if(a<29)return .96;if(a<30)return .89;if(a<31)return .81;return .71;}
  if(pos==="RB"){if(a<24)return 1.05;if(a<26)return 1.0;if(a<27)return .91;if(a<28)return .81;if(a<29)return .69;return .57;}
  if(pos==="QB"){if(a<26)return 1.05;if(a<32)return 1.0;if(a<35)return .95;if(a<38)return .87;return .77;}
  if(pos==="TE"){if(a<24)return 1.0;if(a<27)return 1.03;if(a<30)return 1.0;if(a<31)return .91;return .81;}
  return 1;
}
// v0 intrinsic: market anchor × age curve × clamped momentum × a bounded tilt from the
// BACKTESTED usage gap (opportunity running ahead of scoring). The gap term is the only
// component with an out-of-sample edge, and it varies per player — so it both sharpens
// the read and de-clusters the age-curve tiers. Returns {intrinsic, edge}.
function intrinsicOf(market,trend,pos,age,gap){
  if(market==null)return {intrinsic:null,edge:null};
  const mom=Math.max(-.15,Math.min(.15,(trend||0)/market));
  const gapTilt=gap==null?0:Math.max(-.10,Math.min(.10,gap*0.05));   // backtested usage-gap lean, ±10%
  const intrinsic=market*ageMult(pos,age)*(1+mom)*(1+gapTilt);
  return {intrinsic, edge:(intrinsic-market)/market*100};
}
const fmt=n=>n==null?"—":Math.round(n).toLocaleString();
// daily value snapshots live on the orphan 'data' branch (the moat clock). Fetch the
// listing + each file once and cache; returns [{date, sets:{label:{sleeperId:{v,...}}}}].
let _seriesPromise=null;
function loadValueSeries(){
  if(_seriesPromise)return _seriesPromise;
  const REPO="RobbieCase/DynastyTerminal";
  _seriesPromise=(async()=>{
    const idx=await jget(`https://api.github.com/repos/${REPO}/contents/values?ref=data`);
    const files=(idx||[]).filter(f=>/^\d{4}-\d{2}-\d{2}\.json$/.test(f.name)).sort((a,b)=>a.name.localeCompare(b.name));
    const snaps=await Promise.all(files.map(f=>jget(f.download_url).catch(()=>null)));
    return snaps.filter(Boolean);
  })().catch(()=>[]);
  return _seriesPromise;
}
function norm(s){return (s||"").toLowerCase().replace(/[.'’`]/g,"").replace(/\b(jr|sr|ii|iii|iv|v)\b/g,"").replace(/[^a-z ]/g," ").replace(/\s+/g," ").trim();}
function fcVal(byId,byName,p){if(!byId||!p)return null;if(byId[p.player_id])return byId[p.player_id];if(byName){const o=byName[norm(p.full_name)];if(o)return o;}return null;}
function findSleeper(players,name,pos){if(!players)return null;const n=norm(name);for(const id in players){const p=players[id];if(p.position===pos&&p.full_name&&norm(p.full_name)===n)return p;}return null;}
const USAGE_ROWS={QB:[["pass yds/g","pas"],["rush yds/g","rush"],["carries/g","car"]],RB:[["touches/g","tch"],["carries/g","car"],["rz tch/g","rz"]],WR:[["targets/g","tgt"],["tgt share","shr"],["rz tgt/g","rz"]],TE:[["targets/g","tgt"],["tgt share","shr"],["rz tgt/g","rz"]]};

function App(){
  const [players,setPlayers]=useState(null);
  const [pStatus,setPStatus]=useState("loading players…");
  const [trending,setTrending]=useState([]);
  const [q,setQ]=useState("");
  const [open,setOpen]=useState(false);
  const [sel,setSel]=useState(null);
  const [view,setView]=useState("player");
  const [depthTeam,setDepthTeam]=useState(null);
  const openDepth=t=>{if(t){setDepthTeam(t);setView("depth");}};
  const [fn,setFn]=useState("val");
  const [fc,setFc]=useState(null);
  const [fcName,setFcName]=useState(null);
  const [fcStatus,setFcStatus]=useState("");
  const [sig,setSig]=useState(null);
  useEffect(()=>{(async()=>{try{const r=await fetch("./data/signal.json");if(r.ok)setSig(await r.json());}catch(e){}})();},[]);
  const [set,setSet]=useState({sf:false,ppr:1,teams:12});
  // league
  const [uname,setUname]=useState("");
  const [season,setSeason]=useState("2025");
  const [leagues,setLeagues]=useState(null);
  const [league,setLeague]=useState(null);
  const [teams,setTeams]=useState(null);
  const [lStatus,setLStatus]=useState("");
  const [myLeague,setMyLeague]=useState(null);
  useEffect(()=>{try{const s=localStorage.getItem("dwr_myleague");if(s)setMyLeague(JSON.parse(s));}catch(e){}},[]);
  // watchlist (player_ids) — the moat clock made personal
  const [watch,setWatch]=useState([]);
  useEffect(()=>{try{const s=localStorage.getItem("dwr_watchlist");if(s)setWatch(JSON.parse(s));}catch(e){}},[]);
  const toggleWatch=id=>setWatch(prev=>{const next=prev.includes(id)?prev.filter(x=>x!==id):[...prev,id];try{localStorage.setItem("dwr_watchlist",JSON.stringify(next));}catch(e){}return next;});
  const idx=useRef([]);

  useEffect(()=>{(async()=>{
    try{
      const pm=await jget(`${SLEEP}/players/nfl`);
      setPlayers(pm);setPStatus("");
      idx.current=Object.values(pm)
        .filter(p=>["QB","RB","WR","TE"].includes(p.position)&&p.team&&p.full_name)
        .sort((a,b)=>(a.search_rank||9999)-(b.search_rank||9999));
      try{const ta=await jget(`${SLEEP}/players/nfl/trending/add?limit=18`);
        setTrending(ta.map(t=>({...t,p:pm[t.player_id]})).filter(t=>t.p));}catch(e){}
    }catch(e){setPStatus("could not reach Sleeper — open this file locally or deploy it (CSP can block live fetch inside some embeds)");}
  })();},[]);

  // FantasyCalc values (attempted; honest if blocked)
  useEffect(()=>{(async()=>{
    setFcStatus("loading values…");
    try{
      const u=`https://api.fantasycalc.com/values/current?isDynasty=true&numQbs=${set.sf?2:1}&numTeams=${set.teams}&ppr=${set.ppr}`;
      const d=await jget(u);
      const m={},mn={};
      d.forEach(o=>{if(o.player){if(o.player.sleeperId)m[o.player.sleeperId]=o; if(o.player.name)mn[norm(o.player.name)]=o;}});
      setFc(m);setFcName(mn);setFcStatus("");
    }catch(e){setFc(null);setFcName(null);setFcStatus("values source unreachable from this context — they load once deployed, and chunk 2 replaces them with the backtested model");}
  })();},[set]);

  const sugg=useMemo(()=>{
    if(!q.trim())return [];
    const s=q.toLowerCase();
    return idx.current.filter(p=>p.full_name.toLowerCase().includes(s)).slice(0,8);
  },[q,players]);

  function pick(p){setSel(p);setView("player");setQ("");setOpen(false);}

  async function syncLeagues(){
    setLStatus("finding user…");setLeagues(null);setLeague(null);setTeams(null);
    try{
      const u=await jget(`${SLEEP}/user/${uname.trim()}`);
      if(!u||!u.user_id){setLStatus("no Sleeper user by that name");return;}
      const lg=await jget(`${SLEEP}/user/${u.user_id}/leagues/nfl/${season}`);
      if(!lg.length){setLStatus(`no ${season} leagues for ${uname}`);return;}
      setLeagues(lg);setLStatus("");
    }catch(e){setLStatus("sync failed — check the name/season, or deploy the page");}
  }
  async function loadLeague(lg){
    setLeague(lg);setLStatus("loading rosters…");setTeams(null);
    try{
      const [ros,us]=await Promise.all([jget(`${SLEEP}/league/${lg.league_id}/rosters`),jget(`${SLEEP}/league/${lg.league_id}/users`)]);
      const um={};us.forEach(u=>um[u.user_id]=u);
      const t=ros.map(r=>{
        const owner=um[r.owner_id]||{};
        const val=fc?(r.players||[]).reduce((s,pid)=>{const o=fcVal(fc,fcName,players[pid]);return s+((o&&o.value)||0);},0):null;
        return {rid:r.roster_id,name:(owner.metadata&&owner.metadata.team_name)||owner.display_name||`team ${r.roster_id}`,
          players:r.players||[],w:r.settings?.wins||0,l:r.settings?.losses||0,val};
      });
      if(fc)t.sort((a,b)=>b.val-a.val);
      setTeams(t);setLStatus("");
    }catch(e){setLStatus("could not load league rosters");}
  }
  function setMyTeam(rid){
    if(!league||!teams)return;
    const obj={leagueId:league.league_id,leagueName:league.name,myRosterId:rid,
      teams:teams.map(t=>({rid:t.rid,name:t.name,playerIds:t.players,w:t.w,l:t.l}))};
    try{localStorage.setItem("dwr_myleague",JSON.stringify(obj));}catch(e){}
    setMyLeague(obj);
  }

  return (
  <div className="wrap">
    <div className="head" style={{marginBottom:12}}>
      <div>
        <div className="h1">Dynasty <span style={{color:"var(--wr)"}}>Terminal</span></div>
        <div className="note" style={{marginTop:2}}>dynasty · live build · player · screener · trade · sim</div>
      </div>
      <div className="mono small mut">{pStatus?<span className="err">{pStatus}</span>:<span className="ok">● sleeper live</span>}</div>
    </div>

    {/* COMMAND BAR */}
    <div className="cmd" onBlur={()=>setTimeout(()=>setOpen(false),140)}>
      <span className="prompt">›</span>
      <input value={q} placeholder="type a player, or click below — e.g. jefferson"
        onChange={e=>{setQ(e.target.value);setOpen(true);}} onFocus={()=>setOpen(true)} />
      {!q && <span className="blink"></span>}
      {open && sugg.length>0 &&
        <div className="drop">
          {sugg.map(p=>(
            <div key={p.player_id} className="opt" onMouseDown={()=>pick(p)}>
              <span className="pos" style={{color:POS[p.position],background:posBg(p.position)}}>{p.position}</span>
              <span style={{fontWeight:500}}>{p.full_name}</span>
              <span className="mono small mut">{p.team}</span>
              <span className="mono small faint" style={{marginLeft:"auto"}}>{ageFrom(p.birth_date)?ageFrom(p.birth_date).toFixed(1)+"y":""}</span>
            </div>
          ))}
        </div>}
    </div>

    {/* function tabs */}
    <div className="tabs">
      {[["val","value"],["use","usage"],["mkt","market"],["comp","comps"],["news","wire"]].map(([k,d])=>(
        <span key={k} className={"tab"+(view==="player"&&fn===k?" on":"")} onClick={()=>{setFn(k);setView("player");}}><b>{k}</b> {d}</span>
      ))}
      <span className={"tab"+(view==="scr"?" on":"")} onClick={()=>setView("scr")}><b>scr</b> screener</span>
      <span className={"tab"+(view==="watch"?" on":"")} onClick={()=>setView("watch")}><b>wl</b> watchlist{watch.length?` ·${watch.length}`:""}</span>
      <span className={"tab"+(view==="trade"?" on":"")} onClick={()=>setView("trade")}><b>trd</b> trade</span>
      <span className={"tab"+(view==="sim"?" on":"")} onClick={()=>setView("sim")}><b>sim</b> season</span>
      <span className={"tab"+(view==="tut"?" on":"")} onClick={()=>setView("tut")}><b>?</b> guide</span>
      <span className={"tab"+(view==="league"?" on":"")} style={{marginLeft:"auto"}} onClick={()=>setView(view==="league"?"player":"league")}>
        <b>lg</b> {view==="league"?"close":"my league"}</span>
    </div>

    {/* global league format */}
    <div className="selset" style={{marginTop:8}}>
      <span className="lbl">format</span>
      <span className={"toggle"+(!set.sf?" on":"")} onClick={()=>setSet({...set,sf:false})}>1qb</span>
      <span className={"toggle"+(set.sf?" on":"")} onClick={()=>setSet({...set,sf:true})}>superflex</span>
      <span style={{width:1,height:18,background:"var(--line2)",margin:"0 3px"}}></span>
      <span className={"toggle"+(set.ppr===1?" on":"")} onClick={()=>setSet({...set,ppr:1})}>ppr</span>
      <span className={"toggle"+(set.ppr===0.5?" on":"")} onClick={()=>setSet({...set,ppr:0.5})}>half</span>
      <span style={{width:1,height:18,background:"var(--line2)",margin:"0 3px"}}></span>
      <span className={"toggle"+(set.teams===10?" on":"")} onClick={()=>setSet({...set,teams:10})}>10-tm</span>
      <span className={"toggle"+(set.teams===12?" on":"")} onClick={()=>setSet({...set,teams:12})}>12-tm</span>
      <span className={"toggle"+(set.teams===14?" on":"")} onClick={()=>setSet({...set,teams:14})}>14-tm</span>
    </div>

    {/* WIRE */}
    <div className="wire">
      <span className="wdot"></span><span className="lbl" style={{flex:"none"}}>wire · trending adds</span>
      <div style={{overflow:"hidden",flex:1}}>
        <div className="wtrack">
          {(trending.length?[...trending,...trending]:[{player_id:"x",count:0,p:{full_name:"loading live transactions",position:"WR"}}]).map((t,i)=>(
            <span key={i} className="witem" onClick={()=>t.p&&t.p.player_id&&pick(t.p)} style={{cursor:"pointer"}}>
              <b style={{color:POS[t.p.position]||"var(--tx)"}}>{t.p.full_name}</b> +{t.count} adds</span>
          ))}
        </div>
      </div>
    </div>

    {view==="league"
      ? <LeagueView {...{uname,setUname,season,setSeason,syncLeagues,leagues,loadLeague,league,teams,lStatus,fc,players,pick,setMyTeam,myLeague}}/>
      : view==="depth"
      ? <DepthChart {...{team:depthTeam,players,fc,fcName,pick,sel,onBack:()=>setView("player")}}/>
      : view==="trade"
      ? <TradeTerminal {...{players,fc,fcName,sig,set,pick,myLeague}}/>
      : view==="sim"
      ? <SimTerminal {...{league,teams,fc}}/>
      : view==="scr"
      ? <Screener {...{players,fc,fcName,sig,set,pick}}/>
      : view==="watch"
      ? <WatchlistView {...{watch,players,fc,fcName,sig,set,pick,toggleWatch}}/>
      : view==="tut"
      ? <Tutorial/>
      : <PlayerView {...{sel,fn,fc,fcName,fcStatus,set,setSet,openDepth,sig,players,pick,watch,toggleWatch}}/>}

function DepthChart({team,players,fc,fcName,pick,sel,onBack}){
  const CAP={QB:4,RB:6,WR:7,TE:4};
  const g=useMemo(()=>{
    const out={QB:[],RB:[],WR:[],TE:[]};
    if(!players||!team)return out;
    Object.values(players).forEach(p=>{if(p.team===team&&out[p.position])out[p.position].push(p);});
    Object.keys(out).forEach(k=>out[k].sort((a,b)=>{
      const ao=a.depth_chart_order??99,bo=b.depth_chart_order??99;
      if(ao!==bo)return ao-bo;
      return (a.search_rank||9999)-(b.search_rank||9999);
    }));
    return out;
  },[team,players]);
  return (
  <div style={{marginTop:12}}>
    <div className="head" style={{marginBottom:10}}>
      <div className="mono mut small">depth chart · <span style={{color:"var(--wr)",fontWeight:500}}>{team}</span> · skill positions</div>
      <button className="btn" onClick={onBack}>‹ back to player</button>
    </div>
    <div className="row" style={{gridTemplateColumns:"repeat(auto-fit,minmax(165px,1fr))"}}>
      {["QB","RB","WR","TE"].map(pos=>(
        <div key={pos} className="panel pad">
          <div className="lbl" style={{marginBottom:9,color:POS[pos]}}>{pos}</div>
          {g[pos].slice(0,CAP[pos]).map((p,i)=>{
            const v=fcVal(fc,fcName,p), a=ageFrom(p.birth_date), me=sel&&p.player_id===sel.player_id;
            return (
            <div key={p.player_id} onClick={()=>pick(p)}
              style={{display:"flex",alignItems:"baseline",gap:8,padding:"6px 0",cursor:"pointer",
                borderBottom:i<Math.min(CAP[pos],g[pos].length)-1?"1px solid var(--line)":"none"}}>
              <span className="mono small faint" style={{width:14}}>{i+1}</span>
              <div style={{flex:1,minWidth:0}}>
                <div style={{fontWeight:me?600:400,color:me?"var(--wr)":"var(--tx)",whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis",fontSize:13}}>{p.full_name}</div>
                <div className="mono faint" style={{fontSize:10}}>{a?a.toFixed(1)+"y":""}{p.injury_status?" · "+p.injury_status:""}</div>
              </div>
              {v&&<span className="mono small" style={{color:"var(--mut)"}}>{fmt(v.value)}</span>}
            </div>);
          })}
          {g[pos].length===0&&<div className="mono faint" style={{fontSize:11}}>—</div>}
        </div>
      ))}
    </div>
    <div className="note">built from live Sleeper depth-chart order; values via the same id+name join. click any name to load it. ordering reflects Sleeper's posted depth, not a projection.</div>
  </div>);
}
function PriceHistory({sel,set}){
  const [snaps,setSnaps]=useState(null);
  useEffect(()=>{let dead=false;loadValueSeries().then(s=>{if(!dead)setSnaps(s);});return ()=>{dead=true;};},[]);
  if(snaps===null)return <div className="panel pad" style={{marginTop:12}}><div className="lbl">value history</div><div className="note">loading daily snapshots…</div></div>;
  const label=set.sf?"dyn_sf_ppr_12":"dyn_1qb_ppr_12";
  const pts=snaps.map(s=>{const o=s.sets&&s.sets[label]&&s.sets[label][sel.player_id];return o?{date:s.date,v:o.v}:null;}).filter(Boolean);
  return (
  <div className="panel pad" style={{marginTop:12}}>
    <div className="head" style={{marginBottom:8}}>
      <div className="lbl">value history · {set.sf?"superflex":"1qb"} ppr · 12-tm</div>
      <div className="mono faint" style={{fontSize:11}}>{snaps.length} day{snaps.length===1?"":"s"} tracked</div>
    </div>
    {pts.length<2 ? (
      <div className="note">{pts.length===1
        ?`one snapshot so far (${pts[0].date} · ${fmt(pts[0].v)}) — the daily series accumulates from here.`
        :`not in the daily snapshot yet (it covers the top 12-team PPR market). series began ${snaps[0]?snaps[0].date:"—"}.`}</div>
    ) : (()=>{
      const vals=pts.map(p=>p.v),mn=Math.min(...vals),mx=Math.max(...vals),rng=(mx-mn)||1,n=pts.length;
      const X=i=>5+(i/(n-1))*290, Y=v=>56-((v-mn)/rng)*48;
      const d=pts.map((p,i)=>`${i?"L":"M"}${X(i).toFixed(1)} ${Y(p.v).toFixed(1)}`).join(" ");
      const delta=pts[n-1].v-pts[0].v, up=delta>=0, col=up?"var(--buy)":"var(--sell)";
      return (
      <div>
        <svg viewBox="0 0 300 64" style={{width:"100%",height:64}} preserveAspectRatio="none">
          <path d={d} fill="none" stroke={col} strokeWidth="2" strokeLinejoin="round"/>
          {pts.map((p,i)=><circle key={i} cx={X(i)} cy={Y(p.v)} r="2.5" fill={col}/>)}
        </svg>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"baseline",marginTop:4}}>
          <span className="mono faint" style={{fontSize:11}}>{pts[0].date} · {fmt(pts[0].v)}</span>
          <span className="mono small" style={{color:col}}>{up?"▲":"▼"} {fmt(Math.abs(delta))} ({(delta/pts[0].v*100).toFixed(1)}%)</span>
          <span className="mono faint" style={{fontSize:11}}>{pts[n-1].date} · {fmt(pts[n-1].v)}</span>
        </div>
      </div>);
    })()}
    <div className="note">self-accumulated daily FantasyCalc snapshots — the value time-series that can't be backfilled. grows one row per day the spine runs.</div>
  </div>);
}

        if(series.length>=2)delta=series[series.length-1]-series[0];}
      return {id,p,market,edge,gap:sg?sg.gap:null,flag:sg?sg.flag:null,delta};

              <PosChip pos={r.p.position}/><span style={{whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis",fontSize:13}}>{r.p.full_name}</span>
              {r.flag==="buy"&&<span className="mono" style={{color:"var(--buy)",fontSize:10}}>buy</span>}</span>
            <span className="mono small" style={{textAlign:"right"}}>{fmt(r.market)}</span>
            <span className="mono small" style={{textAlign:"right",color:r.edge==null?"var(--faint)":r.edge>3?"var(--buy)":r.edge<-3?"var(--sell)":"var(--mut)"}}>{r.edge!=null?(r.edge>=0?"+":"")+r.edge.toFixed(1)+"%":"—"}</span>
            <span className="mono small" style={{textAlign:"right",color:r.gap==null?"var(--faint)":r.gap>0?"var(--buy)":"var(--mut)"}}>{r.gap!=null?(r.gap>=0?"+":"")+r.gap:"—"}</span>
            <span className="mono small" style={{textAlign:"right",color:r.delta==null?"var(--faint)":r.delta>=0?"var(--buy)":"var(--sell)"}}>{r.delta==null?(snaps?"flat":"…"):(r.delta>=0?"▲ ":"▼ ")+fmt(Math.abs(r.delta))}</span>
            <span onClick={()=>toggleWatch(r.id)} style={{cursor:"pointer",color:"var(--warn)",textAlign:"right"}} title="remove">★</span>
          </div>))}
      </div>
    </div>
    <div className="note">edge &amp; gap from the live signal; "since tracked" is the change in stored daily value (12-tm {set.sf?"SF":"1QB"} PPR) across the snapshots accumulated so far. tap ★ to remove, or a name to open it.</div>
  </div>);
}
function PlayerView({sel,fn,fc,fcName,fcStatus,set,setSet,openDepth,sig,players,pick,watch,toggleWatch}){

  const sigMeta=sig&&sig.meta;
  if(!sel) return (
    <div className="panel pad" style={{marginTop:12,textAlign:"center",padding:"42px 16px"}}>
      <div className="mono mut">no player loaded</div>
      <div className="note">type a name in the command bar, or click a name on the wire</div>
    </div>);
  const age=ageFrom(sel.birth_date);
  const v=fcVal(fc,fcName,sel);
  const market=v?v.value:null;
  const trend=v?(v.trend30Day||0):null;
  const {intrinsic,edge}=intrinsicOf(market,trend,sel.position,age,sigP?sigP.gap:null);
  const buy=edge!=null&&edge>3, sell=edge!=null&&edge<-3;
  // aging outlook from the survival-fit (context only — not in intrinsic). The 5-season
  // sample can't estimate survival past the early 30s (curve hits 0), so only show
  // conditional odds where the current-age baseline is reliable; flag the tail otherwise.
  const agec=sigMeta&&sigMeta.age_curves&&sigMeta.age_curves[sel.position];
  const agewin=(sigMeta&&sigMeta.aging_window)||[2010,2025];
  const agewinLabel=`${agewin[0]}–${String(agewin[1]).slice(2)}`;
  const survAt=a=>{if(!agec||!agec.surv)return null;const v=agec.surv[Math.max(21,Math.min(36,Math.round(a)))];return v==null?null:v;};
  const baseS=age!=null?survAt(age):null;
  const reliable=baseS!=null&&baseS>=0.1;
  const condSurv=yrs=>{if(!reliable)return null;const s1=survAt(age+yrs);return s1==null||s1<=0?null:Math.max(0,Math.min(1,s1/baseS));};
  const out3=condSurv(3), out5=condSurv(5);

  return (
  <div style={{marginTop:12}}>
    {/* header card */}

          <div className="mono small mut" style={{marginTop:4}}>
            <span style={{color:POS[sel.position]}}>{sel.position}</span> · <span onClick={()=>openDepth(sel.team)} style={{cursor:"pointer",color:"var(--wr)",textDecoration:"underline dotted",textUnderlineOffset:3}}>{sel.team}</span> · {age?age.toFixed(1)+"y":"age n/a"} · yoe {sel.years_exp??"—"}
            {sel.injury_status?<span className="err"> · {sel.injury_status}</span>:""}
          </div>

          {sel.college&&<span className="chip">{sel.college}</span>}
        </div>
      </div>
    </div>

    {/* value metrics */}
    {(fn==="val"||fn==="mkt") && (

      <div>
        <div className="row" style={{gridTemplateColumns:"repeat(3,1fr)"}}>
          <div className="metric"><div className="lbl">market value</div><div className="v">{fmt(market)}</div>
            <div className="mono small" style={{color:trend>=0?"var(--buy)":"var(--sell)",marginTop:3}}>{trend>=0?"▲":"▼"} {fmt(Math.abs(trend))} · 30d</div></div>

            <div className="mono small" style={{color:buy?"var(--buy)":sell?"var(--sell)":"var(--mut)",marginTop:3}}>{buy?"lean buy":sell?"lean sell":"fair"}</div></div>

          :`at ${Math.round(age)} this ${sel.position} is past the reliable range of the ${agewinLabel} survival fit — even with full career history, relevant ${sel.position}s this old are rare, so no honest conditional odds. context only.`}</div>
      </div>

    {fn==="use" && sigP && (
      <div className="panel pad" style={{marginTop:12}}>
        <div className="head" style={{marginBottom:10}}>
          <div className="lbl">usage · opportunity · {sigP.season} season</div>
          <div className="mono small" style={{color:sigP.gap>=0?"var(--buy)":"var(--mut)"}}>gap {sigP.gap>=0?"+":""}{sigP.gap}{sigP.flag==="buy"?" · buy":""}</div>
        </div>
        {(USAGE_ROWS[sigP.pos]||USAGE_ROWS.WR).map(([label,key])=>{

    {fn==="comp" && sigP && sigP.comps && sigP.comps.length>0 && (

// signal.json is keyed by hvpkod PlayerId, which is NOT the Sleeper espn_id, so the
// espn_id match almost never hits — normalized name is the real join. Build the name
// index once per signal object and reuse it everywhere.
let _sigIdxFor=null,_sigIdxCache=null;
function sigIndex(sig){if(!sig)return null;if(_sigIdxFor===sig)return _sigIdxCache;
  const byName={},byPosName={};
  for(const k in sig.players){const s=sig.players[k];const n=norm(s.name);byName[n]=s;byPosName[(s.pos||"")+"|"+n]=s;}
  _sigIdxFor=sig;_sigIdxCache={byName,byPosName};return _sigIdxCache;}
function sigFor(sig,p){if(!sig||!p)return null;
  if(p.espn_id&&sig.players[String(p.espn_id)])return sig.players[String(p.espn_id)];
  const idx=sigIndex(sig);if(!idx)return null;const n=norm(p.full_name);
  return idx.byPosName[(p.position||"")+"|"+n]||idx.byName[n]||null;}   // pos-disambiguated, then name
function sigFlag(sig,p){const s=sigFor(sig,p);return s?s.flag:null;}

// ---- revealed-preference value solver, CLIENT-SIDE over the synced league's real
// trades. Port of spine/trade_solve.solve_values: ridge least-squares anchored to a
// FantasyCalc prior, so a player never traded stays at market and traded players move
// toward what the league's actual deals imply. No league id is hardcoded — it solves
// whatever league the visitor syncs, so it works for anyone. ----
function _solveLinear(M,b){                       // Gauss-Jordan, partial pivoting
  const N=b.length, A=M.map((r,i)=>{const row=Array.from(r);row.push(b[i]);return row;});
  for(let c=0;c<N;c++){
    let piv=c; for(let r=c+1;r<N;r++) if(Math.abs(A[r][c])>Math.abs(A[piv][c])) piv=r;
    [A[c],A[piv]]=[A[piv],A[c]];
    const d=A[c][c]||1e-9; for(let k=c;k<=N;k++) A[c][k]/=d;
    for(let r=0;r<N;r++){ if(r===c)continue; const f=A[r][c]; if(f) for(let k=c;k<=N;k++) A[r][k]-=f*A[c][k]; }
  }
  return A.map(row=>row[N]);
}
function solveValues(trades, prior, lam=1e-3, anchor=1.0){
  const ids=Object.keys(prior); if(!ids.length) return {values:{},appear:{}};
  const idx={}; ids.forEach((a,i)=>idx[a]=i); const N=ids.length;
  const p=ids.map(a=>prior[a]||0), psum=p.reduce((s,x)=>s+x,0), pmean=psum/N;
  const M=Array.from({length:N},()=>new Float64Array(N)), appear=new Float64Array(N);
  for(const {A,B} of trades){
    const s={};
    A.forEach(a=>{ if(a in idx){ s[idx[a]]=(s[idx[a]]||0)+1; appear[idx[a]]++; } });
    B.forEach(b=>{ if(b in idx){ s[idx[b]]=(s[idx[b]]||0)-1; appear[idx[b]]++; } });
    const nz=Object.keys(s).map(Number);
    for(const i of nz) for(const j of nz) M[i][j]+=s[i]*s[j];        // AᵀA
  }
  const an=anchor/N;
  for(let i=0;i<N;i++){ for(let j=0;j<N;j++) M[i][j]+=an; M[i][i]+=lam; }
  const b=p.map(pi=>lam*pi+anchor*pmean);
  let x=_solveLinear(M,b);
  const xsum=x.reduce((s,v)=>s+v,0)||1, k=psum/xsum; x=x.map(v=>v*k);  // pin scale to prior total
  const values={},ap={}; ids.forEach((a,i)=>{values[a]=x[i];ap[a]=appear[i];});
  return {values,appear:ap};
}
async function leagueChain(leagueId, maxSeasons=8){    // follow previous_league_id for full history
  const ids=[]; let id=leagueId, g=0;
  while(id && g++<maxSeasons){ ids.push(id); try{ const lg=await jget(`${SLEEP}/league/${id}`); id=lg&&lg.previous_league_id; }catch(e){ break; } }
  return ids;
}
function tradesFromTxns(all){    // parse Sleeper transactions -> [{A,B}] (mirrors trade_solve.sleeper_ingest)
  const trades=[];
  for(const t of all||[]){
    if(!t||t.type!=="trade"||t.status!=="complete") continue;
    const byRoster={};
    for(const [pid,rid] of Object.entries(t.adds||{})) (byRoster[rid]=byRoster[rid]||[]).push("p:"+pid);
    for(const dp of (t.draft_picks||[])) (byRoster[dp.owner_id]=byRoster[dp.owner_id]||[]).push("pick:"+dp.round);
    const sides=Object.values(byRoster);
    if(sides.length===2) trades.push({A:sides[0],B:sides[1]});
  }
  return trades;
}
async function computeRevealed(leagueId, fc, players){
  const ids=await leagueChain(leagueId);
  const reqs=[]; ids.forEach(id=>{ for(let w=1;w<=18;w++) reqs.push(jget(`${SLEEP}/league/${id}/transactions/${w}`).catch(()=>[])); });
  const trades=tradesFromTxns((await Promise.all(reqs)).flat());
  if(!trades.length) return {trades:0, seasons:ids.length, rows:[]};
  const assets=new Set(); trades.forEach(t=>{t.A.forEach(a=>assets.add(a));t.B.forEach(a=>assets.add(a));});
  const prior={};
  assets.forEach(a=>{
    if(a.startsWith("p:")){ const o=fc&&fc[a.slice(2)]; prior[a]=o?o.value:300; }
    else if(a.startsWith("pick:")){ prior[a]=PICK_BASE[+a.split(":")[1]]||120; }
  });
  const {values,appear}=solveValues(trades, prior);
  const rows=[];
  assets.forEach(a=>{ if(!a.startsWith("p:")||(appear[a]||0)<2) return;
    const sid=a.slice(2), market=prior[a], rev=values[a], p=players&&players[sid];
    rows.push({sid, name:p?p.full_name:sid, pos:p?p.position:"WR", market, revealed:rev, n:appear[a],
      div:market?((rev-market)/market*100):0}); });
  rows.sort((x,y)=>Math.abs(y.div)-Math.abs(x.div));
  return {trades:trades.length, seasons:ids.length, rows};
}

const PICKS=[["2026 early 1st",5000],["2026 mid 1st",4200],["2026 late 1st",3500],["2026 2nd",1500],["2026 3rd",600],["2027 1st",3800],["2027 2nd",1300],["2027 3rd",550]];
// flat dynasty pick estimates, discounted by how far out the draft is and scaled for
// format (superflex pushes 1sts up — QBs go early). still estimates, not slotted by standings.
const PICK_BASE={1:4000,2:1400,3:600};
function ordinal(r){return r===1?"1st":r===2?"2nd":r===3?"3rd":r+"th";}
function pickValue(round,season,minSeason,sf){
  let v=PICK_BASE[round]||120;
  v*=Math.pow(0.92,Math.max(0,(+season)-(+minSeason)));   // farther-out picks worth less
  if(sf){if(round===1)v*=1.25;else if(round===2)v*=1.10;} // superflex premium on early picks
  return Math.round(v);
}
function PosChip({pos}){return <span className="pos" style={{color:pos==="PICK"?"var(--pick)":POS[pos],background:pos==="PICK"?"rgba(185,139,255,.15)":posBg(pos)}}>{pos}</span>;}

function TradeTerminal({players,fc,fcName,sig,set,pick,myLeague}){
  const mine=myLeague&&players;
  const [picks,setPicks]=useState(null);   // {minS, list:[{s,rd,orig,own,fromName}]} derived from Sleeper, or null
  useEffect(()=>{
    if(!mine||!myLeague.leagueId){setPicks(null);return;}
    let dead=false;
    (async()=>{
      try{
        const [lg,tp]=await Promise.all([
          jget(`${SLEEP}/league/${myLeague.leagueId}`),
          jget(`${SLEEP}/league/${myLeague.leagueId}/traded_picks`)]);
        const base=parseInt(lg.season)||new Date().getFullYear();
        const rounds=Math.min((lg.settings&&lg.settings.draft_rounds)||3,3);
        const rids=myLeague.teams.map(t=>t.rid);
        const seasonSet=new Set([base+1,base+2,base+3]);
        (tp||[]).forEach(p=>{const s=parseInt(p.season);if(s>=base)seasonSet.add(s);});
        const seasons=[...seasonSet].sort((a,b)=>a-b);const minS=seasons[0];
        const owner={};
        seasons.forEach(s=>rids.forEach(r=>{for(let rd=1;rd<=rounds;rd++)owner[`${s}|${rd}|${r}`]=r;}));
        (tp||[]).forEach(p=>{const k=`${p.season}|${p.round}|${p.roster_id}`;if(k in owner)owner[k]=p.owner_id;});
        const list=[];
        Object.entries(owner).forEach(([k,o])=>{if(o!==myLeague.myRosterId)return;
          const [s,rd,orig]=k.split("|").map(Number);const own=orig===myLeague.myRosterId;
          list.push({s,rd,orig,own,fromName:own?null:((myLeague.teams.find(t=>t.rid===orig)||{}).name||"?")});});
        list.sort((a,b)=>a.s-b.s||a.rd-b.rd);
        if(!dead)setPicks({minS,list});
      }catch(e){if(!dead)setPicks(null);}
    })();
    return ()=>{dead=true;};
  },[mine,myLeague&&myLeague.leagueId]);
  const ownedPicks=picks?picks.list.map(d=>({pick:true,id:`pk_${d.s}_${d.rd}_${d.orig}`,
    name:`${d.s} ${ordinal(d.rd)}${d.own?"":` (via ${d.fromName})`}`,value:pickValue(d.rd,d.s,picks.minS,set.sf)})):null;
  const pickChips=ownedPicks||PICKS.map(([nm,v])=>({pick:true,id:"pk_"+nm,name:nm,value:v}));

  const [get,setGet]=useState([]);const [give,setGive]=useState([]);
  const [q,setQ]=useState("");const [qside,setQside]=useState("get");
  const [tgtPos,setTgtPos]=useState("ALL");const [tgtSort,setTgtSort]=useState("buy");
  const pidx=useMemo(()=>players?Object.values(players).filter(p=>["QB","RB","WR","TE"].includes(p.position)&&p.team&&p.full_name).sort((x,y)=>(x.search_rank||9999)-(y.search_rank||9999)):[],[players]);
  const sugg=q.trim()?pidx.filter(p=>p.full_name.toLowerCase().includes(q.toLowerCase())).slice(0,6):[];
  const valOf=it=>it.pick?it.value:(o=>o?o.value:0)(fcVal(fc,fcName,it));
  const keyOf=it=>it.pick?it.id:it.player_id;
  const nameOf=it=>it.pick?it.name:it.full_name;
  const posOf=it=>it.pick?"PICK":it.position;
  const has=(list,it)=>list.find(x=>keyOf(x)===keyOf(it));
  const addTo=(setter,it)=>setter(prev=>has(prev,it)?prev:[...prev,it]);
  const rmFrom=(setter,it)=>setter(prev=>prev.filter(x=>keyOf(x)!==keyOf(it)));

  // my roster, league pool, positional needs
  const resolve=ids=>(ids||[]).map(id=>players&&players[id]).filter(Boolean);
  const myTeam=mine?myLeague.teams.find(t=>t.rid===myLeague.myRosterId):null;
  const myPlayers=myTeam?resolve(myTeam.playerIds).sort((a,b)=>valOf(b)-valOf(a)):[];
  const pool=mine?myLeague.teams.filter(t=>t.rid!==myLeague.myRosterId).flatMap(t=>resolve(t.playerIds).map(p=>({p,owner:t.name}))):[];
  const posSum=pls=>{const s={QB:0,RB:0,WR:0,TE:0};pls.forEach(p=>{if(s[p.position]!=null)s[p.position]+=valOf(p);});return s;};
  const myS=posSum(myPlayers);
  const sums=mine?myLeague.teams.map(t=>posSum(resolve(t.playerIds))):[];
  const avg={};["QB","RB","WR","TE"].forEach(P=>avg[P]=sums.length?sums.reduce((a,b)=>a+b[P],0)/sums.length:0);
  const needs=["QB","RB","WR","TE"].map(P=>({P,need:avg[P]-(myS[P]||0)})).sort((a,b)=>b.need-a.need);
  const weak=needs.filter(n=>n.need>0).slice(0,2).map(n=>n.P);
  // buy-low / up-and-comer score: surface ascending players the market hasn't priced.
  // gap is the backtested signal (weighted highest); + buy flag, snap-share role, youth;

  const buyScore=p=>{

    const gapN=Math.max(0,Math.min(1,(s.gap+1)/3));          // gap (σ) -> 0..1

    const priceN=Math.max(0,Math.min(1,valOf(p)/8000));

  };

  const cand=pool.filter(x=>(tgtPos==="ALL"||x.p.position===tgtPos)&&valOf(x.p)>=VALUE_FLOOR)
    .map(x=>({...x,score:buyScore(x.p),val:valOf(x.p),sg:sigFor(sig,x.p)}));

  const topPiece=Math.max(1,...get.concat(give).filter(it=>!it.pick).map(valOf));
  const realBodies=list=>list.filter(it=>!it.pick&&valOf(it)>=0.10*topPiece).length;
  const adj=(sum,c,oc)=>{const x=Math.min(4,Math.max(0,c-oc));return x?sum*(1-0.04*x):sum;};
  const aG=adj(sumG,realBodies(get),realBodies(give)),aGv=adj(sumGv,realBodies(give),realBodies(get));
  const diff=aGv-aG;const tot=Math.max(aG,aGv,1);
  const verdict=!get.length||!give.length?"build a trade":Math.abs(diff)/tot<0.08?"fair":diff>0?"you win value":"you overpay";
  const lblGet=mine?"I get":"side A",lblGive=mine?"I give":"side B";

  const Col=({title,list,setter,sum,adjsum})=>(
    <div className="panel pad">
      <div className="head" style={{marginBottom:8}}><div className="lbl">{title}</div><div className="mono small" style={{color:"var(--wr)"}}>{fmt(adjsum)}</div></div>
      {list.length===0&&<div className="mono faint" style={{fontSize:11,padding:"4px 0"}}>empty</div>}
      {list.map(it=>{const fl=!it.pick&&sigFlag(sig,it);return(
        <div key={keyOf(it)} style={{display:"flex",alignItems:"center",gap:8,padding:"5px 0",borderBottom:"1px solid var(--line)"}}>
          <PosChip pos={posOf(it)}/>
          <span style={{flex:1,fontSize:13}}>{nameOf(it)}{fl==="buy"&&<span className="mono" style={{color:"var(--buy)",fontSize:10}}> · buy</span>}</span>
          <span className="mono small mut">{fmt(valOf(it))}</span>
          <span onClick={()=>rmFrom(setter,it)} style={{cursor:"pointer",color:"var(--faint)"}}>×</span>
        </div>);})}
      {adjsum!==sum&&sum>0&&<div className="mono faint" style={{fontSize:10,marginTop:5}}>raw {fmt(sum)} · −{Math.round((1-adjsum/sum)*100)}% roster-spot tax</div>}
    </div>);

  return (
  <div style={{marginTop:12}}>
    {mine && <div className="panel pad">
      <div className="head" style={{marginBottom:8}}><div className="lbl">my roster · {myTeam?myTeam.name:""}</div>
        <div className="mono faint" style={{fontSize:11}}>{myLeague.leagueName}</div></div>
      <div style={{display:"flex",flexWrap:"wrap",gap:6}}>

      </div>
      <div className="lbl" style={{margin:"12px 0 6px"}}>my picks {ownedPicks&&<span className="mut" style={{textTransform:"none"}}>· {ownedPicks.length} owned</span>}</div>
      <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
        {pickChips.map(it=>(

            <span style={{color:"var(--pick)"}}>◆</span> {it.name} <span className="mut">{fmt(it.value)}</span></span>))}

    {mine && <div className="panel pad" style={{marginTop:12}}>
      <div className="head"><div className="lbl">positional needs</div>
        <div style={{display:"flex",gap:6}}>
          <span className={"toggle"+(tgtSort==="buy"?" on":"")} onClick={()=>setTgtSort("buy")}>buy-low</span>

      <div style={{display:"flex",gap:14,flexWrap:"wrap",marginTop:8}}>
        {needs.map(n=>(<div key={n.P} style={{fontSize:12}}>
          <span style={{color:POS[n.P]}}>{n.P}</span> <span className="mono" style={{color:n.need>0?"var(--warn)":"var(--buy)"}}>{n.need>0?"need":"surplus"}</span>
          <span className="mut mono" style={{fontSize:10}}> {n.need>0?"−":"+"}{fmt(Math.abs(Math.round(n.need)))}</span></div>))}
      </div>
      <div style={{display:"flex",gap:6,flexWrap:"wrap",margin:"12px 0 8px"}}>
        {["ALL","QB","RB","WR","TE"].map(P=>{const isWeak=weak.includes(P);return(
          <span key={P} className={"toggle"+(tgtPos===P?" on":"")} onClick={()=>setTgtPos(P)}
            style={tgtPos===P&&P!=="ALL"?{color:POS[P],borderColor:POS[P]}:{}}>
            {P.toLowerCase()}{isWeak&&<span style={{color:"var(--warn)"}}> •</span>}</span>);})}
      </div>
      {targets.length===0&&<div className="mono faint" style={{fontSize:11}}>{fc?"no candidates at this position":"no targets — load FantasyCalc values (deploy)"}</div>}
      {targets.map(({p,owner,score,sg})=>{const added=has(get,p);const a=ageFrom(p.birth_date);return(
        <div key={p.player_id} onClick={()=>addTo(setGet,p)} className="opt" style={{borderRadius:7,opacity:added?.5:1,alignItems:"flex-start"}}>
          <PosChip pos={p.position}/>
          <div style={{flex:1,minWidth:0}}>
            <div>{p.full_name}{sg&&sg.flag==="buy"&&<span className="mono" style={{color:"var(--buy)",fontSize:10}}> · buy</span>}
              <span className="mut mono" style={{fontSize:10}}> · {owner}</span></div>
            <div className="mono faint" style={{fontSize:10,marginTop:2}}>
              {sg?`gap ${sg.gap>=0?"+":""}${sg.gap}`:"no signal"}
              {sg&&sg.snap!=null?` · snap ${Math.round(sg.snap*100)}%`:""}
              {a!=null?` · ${a.toFixed(1)}y`:""}</div>
          </div>
          <span className="mono small mut">{fmt(valOf(p))}</span>
          <span className="mono" style={{color:"var(--wr)",fontSize:11}}>+ get</span></div>);})}
      <div className="note">{tgtSort==="buy"
        ?"buy-low score: usage gap (backtested) + buy flag + snap-share role + youth, minus a price penalty — ascending players the market hasn't caught up to. • marks your weak spots."
        :"ranked by raw market value (best available)."}</div>
    </div>}

    <div className="panel pad" style={{marginTop:12}}>
      <div style={{display:"flex",gap:8,alignItems:"center",flexWrap:"wrap"}}>
        <span className="lbl">search → </span>
        <span className={"toggle"+(qside==="get"?" on":"")} onClick={()=>setQside("get")}>{lblGet}</span>
        <span className={"toggle"+(qside==="give"?" on":"")} onClick={()=>setQside("give")}>{lblGive}</span>
        <div style={{position:"relative",flex:"1 1 220px"}}>
          <input className="field" style={{width:"100%"}} placeholder={`search any player → ${qside==="get"?lblGet:lblGive}`} value={q} onChange={e=>setQ(e.target.value)}/>
          {sugg.length>0&&<div className="drop">{sugg.map(p=>(
            <div key={p.player_id} className="opt" onMouseDown={()=>{addTo(qside==="get"?setGet:setGive,p);setQ("");}}>
              <PosChip pos={p.position}/><span style={{flex:1}}>{p.full_name}</span><span className="mono small mut">{fmt(valOf(p))}</span></div>))}</div>}
        </div>
      </div>
      {!fc&&<div className="note">values need FantasyCalc (loads on deploy).</div>}
    </div>

    <div className="row" style={{gridTemplateColumns:"1fr 1fr"}}>
      <Col title={lblGet} list={get} setter={setGet} sum={sumG} adjsum={aG}/>
      <Col title={lblGive} list={give} setter={setGive} sum={sumGv} adjsum={aGv}/>
    </div>

    <div className="panel pad" style={{marginTop:12,borderColor:verdict==="fair"?"var(--buy)":"var(--line2)"}}>
      <div className="head"><div className="lbl">verdict</div>
        <div className="mono" style={{color:verdict==="fair"?"var(--buy)":verdict==="build a trade"?"var(--mut)":verdict==="you win value"?"var(--buy)":"var(--warn)"}}>{verdict}</div></div>
      {get.length>0&&give.length>0&&<div style={{display:"flex",alignItems:"center",gap:8,marginTop:9}}>
        <span className="mono small mut" style={{width:64}}>{lblGet} {fmt(aG)}</span>
        <div className="bar" style={{flex:1}}><div style={{width:(aG/(aG+aGv)*100)+"%",background:"var(--wr)"}}></div></div>
        <span className="mono small mut" style={{width:64,textAlign:"right"}}>{fmt(aGv)} {lblGive}</span></div>}
      <div className="note">FantasyCalc values at your format, with a roster-spot tax for consolidation (4%/extra rosterable body — picks &amp; throw-ins excluded, capped). The buy signal currently tilts target suggestions, not the verdict. Roadmap: fold in the league's revealed-preference values (lg tab) and a contention-window weighting.</div>
    </div>
  </div>);
}

function SimTerminal({league,teams,fc}){
  const [res,setRes]=useState(null);const [busy,setBusy]=useState(false);const [status,setStatus]=useState("");
  async function run(){
    if(!league||!teams){return;}
    setBusy(true);setStatus("loading schedule…");setRes(null);
    try{
      const start=(league.settings&&league.settings.playoff_week_start)||15;
      const weeks=[];for(let w=1;w<start;w++)weeks.push(w);
      const all=await Promise.all(weeks.map(w=>jget(`${SLEEP}/league/${league.league_id}/matchups/${w}`).catch(()=>null)));
      const sched=[];
      all.forEach(wk=>{if(!wk)return;const byM={};wk.forEach(e=>{if(e.matchup_id==null)return;(byM[e.matchup_id]=byM[e.matchup_id]||[]).push(e.roster_id);});Object.values(byM).forEach(pr=>{if(pr.length===2)sched.push(pr);});});
      if(!sched.length){setStatus("no schedule found for this league");setBusy(false);return;}
      const strength={};teams.forEach(t=>strength[t.rid]=fc?Math.max(t.val,1):(t.w*120+1000));
      const vs=Object.values(strength);const mean=vs.reduce((a,b)=>a+b,0)/vs.length;
      const sd=Math.sqrt(vs.reduce((a,b)=>a+(b-mean)**2,0)/vs.length)||1;
      const z=r=>(strength[r]-mean)/sd;
      const SIMS=3000,pN=(league.settings&&league.settings.playoff_teams)||6;
      const titles={},po={};teams.forEach(t=>{titles[t.rid]=0;po[t.rid]=0;});
      setStatus("running 3,000 seasons…");
      for(let s=0;s<SIMS;s++){
        const w={};teams.forEach(t=>w[t.rid]=0);
        sched.forEach(([ra,rb])=>{const pa=1/(1+Math.exp(-0.9*(z(ra)-z(rb))));if(Math.random()<pa)w[ra]++;else w[rb]++;});
        const order=teams.map(t=>t.rid).sort((x,y)=>(w[y]-w[x])||(strength[y]-strength[x]));
        const seed=order.slice(0,pN);seed.forEach(r=>po[r]++);
        let f=[...seed];while(f.length>1){const nx=[];for(let i=0;i<f.length;i+=2){const ra=f[i],rb=f[i+1];if(rb==null){nx.push(ra);continue;}const pa=1/(1+Math.exp(-0.9*(z(ra)-z(rb))));nx.push(Math.random()<pa?ra:rb);}f=nx;}
        if(f[0]!=null)titles[f[0]]++;
      }
      setRes(teams.map(t=>({name:t.name,playoff:po[t.rid]/SIMS,title:titles[t.rid]/SIMS})).sort((a,b)=>b.title-a.title));
      setStatus("");
    }catch(e){setStatus("sim failed — try re-syncing the league");}
    setBusy(false);
  }
  if(!league||!teams) return (
    <div className="panel pad" style={{marginTop:12,textAlign:"center",padding:"36px 16px"}}>
      <div className="mono mut">no league synced</div>
      <div className="note">open the <b>lg</b> tab, sync a league and load it, then come back to run the season sim.</div>
    </div>);
  return (
  <div style={{marginTop:12}}>
    <div className="panel pad">
      <div className="head"><div className="lbl">season sim · {league.name}</div>
        <button className="btn" onClick={run} disabled={busy}>{busy?"running…":"run 3,000 seasons"}</button></div>
      {status&&<div className="note">{status}</div>}
      <div className="note">monte-carlo over the real schedule; each game decided by {fc?"roster value":"current record"} strength (logistic). playoff bracket is approximate (seed-order single elim).</div>
    </div>
    {res&&<div className="row" style={{gridTemplateColumns:"1fr"}}>
      {res.map((t,i)=>(
        <div key={i} className="teamcard" style={{cursor:"default"}}>
          <span className="rk">{i+1}</span>
          <div style={{flex:1,minWidth:0}}>
            <div style={{fontWeight:500,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{t.name}</div>
            <div className="bar" style={{marginTop:6}}><div style={{width:(t.playoff*100)+"%",background:"var(--wr)"}}></div></div>
          </div>
          <div style={{textAlign:"right"}}>
            <div className="mono small" style={{color:"var(--buy)"}}>{(t.title*100).toFixed(1)}% title</div>
            <div className="mono faint" style={{fontSize:11}}>{(t.playoff*100).toFixed(0)}% playoff</div>
          </div>
        </div>))}
    </div>}
  </div>);
}

function Screener({players,fc,fcName,sig,set,pick}){
  const [pos,setPos]=useState("ALL");
  const [sortK,setSortK]=useState("edge");
  const [dir,setDir]=useState(-1);          // -1 desc, 1 asc
  const [buysOnly,setBuysOnly]=useState(false);
  const [q,setQ]=useState("");
  const CAP=120;

  const rows=useMemo(()=>{
    if(!players)return [];
    const out=[];
    for(const id in players){
      const p=players[id];
      if(!["QB","RB","WR","TE"].includes(p.position)||!p.team||!p.full_name)continue;
      const v=fcVal(fc,fcName,p);
      const market=v?v.value:null;
      const trend=v?(v.trend30Day||0):null;
      const age=ageFrom(p.birth_date);
      const sp=sigFor(sig,p);
      const z_opp=sp?sp.z_opp:null, gap=sp?sp.gap:null, flag=sp?sp.flag:null;
      const {intrinsic,edge}=intrinsicOf(market,trend,p.position,age,gap);
      if(market==null&&!sp)continue;        // skip players with neither price nor signal
      out.push({p,name:p.full_name,pos:p.position,team:p.team,market,intrinsic,edge,z_opp,gap,flag});
    }
    return out;
  },[players,fc,fcName,sig]);

  const filtered=useMemo(()=>{
    let r=rows;
    if(pos!=="ALL")r=r.filter(x=>x.pos===pos);
    if(buysOnly)r=r.filter(x=>x.flag==="buy");
    if(q.trim()){const s=q.toLowerCase();r=r.filter(x=>x.name.toLowerCase().includes(s));}
    return r.slice().sort((a,b)=>{
      if(sortK==="name")return dir*a.name.localeCompare(b.name);
      const av=a[sortK],bv=b[sortK];
      if(av==null&&bv==null)return 0; if(av==null)return 1; if(bv==null)return -1;  // nulls last
      return dir*(av-bv);
    });
  },[rows,pos,buysOnly,q,sortK,dir]);

  const flags=filtered.filter(r=>r.flag==="buy").length;
  function sortBy(k){if(k===sortK)setDir(d=>-d);else{setSortK(k);setDir(k==="name"?1:-1);}}
  const arrow=k=>sortK===k?(dir===-1?" ▼":" ▲"):"";
  const COLS=[["market","value"],["intrinsic","intrinsic"],["edge","edge"],["z_opp","usage z"],["gap","gap"]];
  const GRID="26px minmax(140px,1.5fr) 76px 78px 66px 66px 60px 46px";
  const HCell=({k,label,r})=>(
    <span onClick={()=>sortBy(k)} className="lbl" style={{cursor:"pointer",textAlign:r?"right":"left",whiteSpace:"nowrap",color:sortK===k?"var(--wr)":"var(--faint)"}}>{label}{arrow(k)}</span>);

  return (
  <div style={{marginTop:12}}>
    <div className="panel pad">
      <div className="head" style={{marginBottom:10}}>
        <div className="lbl">screener · mispricing board</div>
        <div className="mono faint" style={{fontSize:11}}>{filtered.length} players · {flags} buy flags</div>
      </div>
      <div className="selset" style={{marginTop:0}}>
        <span className="lbl">pos</span>
        {["ALL","QB","RB","WR","TE"].map(P=>(
          <span key={P} className={"toggle"+(pos===P?" on":"")} onClick={()=>setPos(P)}
            style={pos===P&&P!=="ALL"?{color:POS[P],borderColor:POS[P]}:{}}>{P.toLowerCase()}</span>))}
        <span style={{width:1,height:18,background:"var(--line2)",margin:"0 3px"}}></span>
        <span className={"toggle"+(buysOnly?" on":"")} onClick={()=>setBuysOnly(b=>!b)}>buy flags</span>
        <input className="field" style={{flex:"1 1 160px",padding:"6px 10px",fontSize:12}} placeholder="filter by name…" value={q} onChange={e=>setQ(e.target.value)}/>
      </div>
    </div>

    <div className="panel" style={{marginTop:12,overflowX:"auto"}}>
      <div style={{minWidth:640}}>
        <div style={{display:"grid",gridTemplateColumns:GRID,gap:8,padding:"10px 14px",borderBottom:"1px solid var(--line2)",alignItems:"center"}}>
          <span></span>
          <HCell k="name" label="player"/>
          {COLS.map(([k,l])=><HCell key={k} k={k} label={l} r/>)}
          <span className="lbl" style={{textAlign:"right"}}>flag</span>
        </div>
        {filtered.slice(0,CAP).map((x,i)=>(
          <div key={x.p.player_id} onClick={()=>pick(x.p)}
            style={{display:"grid",gridTemplateColumns:GRID,gap:8,padding:"7px 14px",alignItems:"center",cursor:"pointer",
              borderBottom:i<Math.min(CAP,filtered.length)-1?"1px solid var(--line)":"none"}}
            onMouseEnter={e=>e.currentTarget.style.background="#1B212A"} onMouseLeave={e=>e.currentTarget.style.background=""}>
            <span className="mono faint" style={{fontSize:11}}>{i+1}</span>
            <span style={{display:"flex",alignItems:"center",gap:7,minWidth:0}}>
              <PosChip pos={x.pos}/>
              <span style={{whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis",fontSize:13}}>{x.name}</span>
              <span className="mono faint" style={{fontSize:10}}>{x.team}</span>
            </span>
            <span className="mono small" style={{textAlign:"right",color:"var(--tx)"}}>{x.market!=null?fmt(x.market):"—"}</span>
            <span className="mono small" style={{textAlign:"right",color:x.intrinsic!=null?"var(--wr)":"var(--faint)"}}>{x.intrinsic!=null?fmt(x.intrinsic):"—"}</span>
            <span className="mono small" style={{textAlign:"right",color:x.edge==null?"var(--faint)":x.edge>3?"var(--buy)":x.edge<-3?"var(--sell)":"var(--mut)"}}>{x.edge!=null?(x.edge>=0?"+":"")+x.edge.toFixed(1)+"%":"—"}</span>
            <span className="mono small" style={{textAlign:"right",color:x.z_opp!=null?"var(--tx)":"var(--faint)"}}>{x.z_opp!=null?(x.z_opp>=0?"+":"")+x.z_opp.toFixed(1):"—"}</span>
            <span className="mono small" style={{textAlign:"right",color:x.gap==null?"var(--faint)":x.gap>0?"var(--buy)":"var(--mut)"}}>{x.gap!=null?(x.gap>=0?"+":"")+x.gap.toFixed(1):"—"}</span>
            <span style={{textAlign:"right"}}>{x.flag==="buy"?<span className="mono" style={{color:"var(--buy)",fontSize:10}}>buy</span>:<span className="faint">·</span>}</span>
          </div>))}
        {filtered.length===0&&<div className="mono faint" style={{fontSize:12,padding:"18px 14px",textAlign:"center"}}>no players match — clear filters{!sig?", or wait for signal.json":""}</div>}
      </div>
    </div>
    {filtered.length>CAP&&<div className="note">showing top {CAP} of {filtered.length} — narrow with the position / name filters.</div>}
    <div className="note">
      click any row to open the player. value &amp; edge come from FantasyCalc{!fc&&" (load on deploy)"}; usage z &amp; gap come from the spine's season feed (signal.json), which is stable through the offseason.
    </div>
  </div>);
}

const GLOSSARY=[
  ["market value","FantasyCalc's trade value — derived from real trades across thousands of leagues, at your league format. The crowd's price."],
  ["intrinsic · v0","Market × position age-curve × clamped 30-day momentum × a bounded tilt from the backtested usage gap (±10%). The gap term is the one component with out-of-sample edge. Still a placeholder for survival-curve aging + the trade-solve."],
  ["edge","(intrinsic − market) / market. Positive = read as underpriced vs the market. Now driven partly by the backtested usage gap, so it reflects signal — not just the age tier."],
  ["usage z · opp","How a player's opportunity ranks vs their position that season, in standard deviations. +2σ ≈ elite usage, 0 ≈ average."],
  ["usage gap","opportunity z minus scoring z. Positive = getting the opportunity but not yet scoring it — a positive-regression / buy lean."],
  ["flag · buy","Top-quartile usage gap within position. Backtested: these flags improved their later scoring above the base rate."],
  ["target depth / σ bars","Per-game usage (targets, touches, etc.) standardized within position; bar length is the z-score, the number is the raw rate."],
  ["comps","Nearest players by standardized usage + production profile within position — statistical role twins, not name-brand guesses."],
  ["roster-spot tax","In dynasty, extra bodies cost roster spots. The trade terminal discounts the side receiving more players to model consolidation."],
];
function TipMetric({term,children}){
  const g=GLOSSARY.find(x=>x[0]===term);
  return <span className="tip">{children}<span className="tipbox"><b style={{color:"var(--wr)"}}>{term}</b><br/>{g?g[1]:""}</span></span>;
}

  </div>);
}

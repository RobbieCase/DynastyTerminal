<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Gridiron Terminal — dynasty</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
<style>
  :root{
    --ink:#0E1116; --panel:#161B22; --panel2:#1B212A; --line:#232A33; --line2:#2E3742;
    --tx:#E6EAF0; --mut:#8B96A5; --faint:#5B6675;
    --wr:#2DD4A7; --rb:#8BD450; --qb:#4DA3FF; --te:#F0A94B; --pick:#B98BFF;
    --buy:#2DD4A7; --sell:#F2647A; --warn:#F0A94B;
    --mono:'JetBrains Mono',ui-monospace,monospace; --sans:'Inter',system-ui,sans-serif;
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--ink);color:var(--tx);font-family:var(--sans);font-size:14px;-webkit-font-smoothing:antialiased}
  a{color:inherit}
  ::selection{background:rgba(45,212,167,.3)}
  .wrap{max-width:1180px;margin:0 auto;padding:14px}
  .mono{font-family:var(--mono)}
  .mut{color:var(--mut)} .faint{color:var(--faint)}
  .lbl{font-family:var(--mono);font-size:11px;letter-spacing:.04em;color:var(--faint);text-transform:lowercase}
  .panel{background:var(--panel);border:1px solid var(--line);border-radius:10px}
  .pad{padding:14px 16px}
  /* command bar */
  .cmd{display:flex;align-items:center;gap:10px;background:var(--panel);border:1px solid var(--line2);border-radius:10px;padding:10px 12px;position:relative}
  .cmd .prompt{color:var(--wr);font-family:var(--mono);font-weight:700}
  .cmd input{flex:1;background:transparent;border:0;outline:0;color:var(--tx);font-family:var(--mono);font-size:15px;min-width:60px}
  .cmd input::placeholder{color:var(--faint)}
  .blink{width:8px;height:17px;background:var(--wr);animation:bl 1.1s steps(1) infinite}
  @keyframes bl{50%{opacity:0}}
  .drop{position:absolute;top:calc(100% + 6px);left:0;right:0;background:var(--panel2);border:1px solid var(--line2);border-radius:10px;z-index:30;overflow:hidden;max-height:320px;overflow-y:auto}
  .opt{display:flex;align-items:center;gap:10px;padding:9px 12px;cursor:pointer;border-bottom:1px solid var(--line)}
  .opt:hover{background:#222A34}
  .pos{font-family:var(--mono);font-weight:700;font-size:11px;border-radius:5px;padding:2px 6px}
  .tabs{display:flex;gap:6px;flex-wrap:wrap;margin-top:10px}
  .tab{font-family:var(--mono);font-size:12px;color:var(--mut);background:var(--panel);border:1px solid var(--line);border-radius:7px;padding:6px 11px;cursor:pointer;user-select:none}
  .tab b{color:var(--tx);font-weight:500}
  .tab.on{border-color:var(--wr);color:var(--tx)} .tab.on b{color:var(--wr)}
  .tab:hover{border-color:var(--line2)}
  /* wire */
  .wire{display:flex;align-items:center;gap:14px;margin-top:10px;background:var(--panel);border:1px solid var(--line);border-radius:8px;padding:8px 12px;overflow:hidden}
  .wdot{width:7px;height:7px;border-radius:50%;background:var(--buy);flex:none;box-shadow:0 0 0 0 rgba(45,212,167,.5);animation:pulse 2s infinite}
  @keyframes pulse{70%{box-shadow:0 0 0 6px rgba(45,212,167,0)}}
  .wtrack{display:flex;gap:26px;white-space:nowrap;animation:marq 38s linear infinite}
  .wire:hover .wtrack{animation-play-state:paused}
  @keyframes marq{from{transform:translateX(0)}to{transform:translateX(-50%)}}
  .witem{font-family:var(--mono);font-size:12px;color:var(--mut)}
  .witem b{color:var(--tx);font-weight:500}
  /* grid */
  .row{display:grid;gap:12px;margin-top:12px}
  .metric{background:var(--panel2);border-radius:8px;padding:11px 13px}
  .metric .v{font-family:var(--mono);font-size:22px;font-weight:500;margin-top:3px}
  .bar{height:7px;background:#0E141B;border-radius:4px;overflow:hidden}
  .bar>div{height:100%}
  .seg{display:flex;align-items:center;gap:9px;margin-bottom:8px}
  .seg .nm{font-family:var(--mono);font-size:11px;color:var(--faint);width:54px}
  .seg .vn{font-family:var(--mono);font-size:12px;width:30px;text-align:right;color:var(--tx)}
  .chip{font-family:var(--mono);font-size:11px;border-radius:6px;padding:3px 8px;background:var(--panel2);color:var(--mut)}
  .stub{border:1px dashed var(--line2);border-radius:8px;padding:13px;color:var(--faint);font-family:var(--mono);font-size:12px;line-height:1.6}
  .stub b{color:var(--mut);font-weight:500}
  .btn{font-family:var(--mono);font-size:13px;color:var(--tx);background:var(--panel2);border:1px solid var(--line2);border-radius:8px;padding:9px 14px;cursor:pointer}
  .btn:hover{border-color:var(--wr)}
  .field{background:transparent;border:1px solid var(--line2);border-radius:8px;color:var(--tx);font-family:var(--mono);padding:9px 11px;outline:0}
  .field:focus{border-color:var(--wr)}
  .teamcard{display:flex;align-items:center;gap:12px;background:var(--panel);border:1px solid var(--line);border-radius:9px;padding:11px 13px;cursor:pointer}
  .teamcard:hover{border-color:var(--line2)}
  .rk{font-family:var(--mono);font-size:13px;color:var(--faint);width:24px}
  .selset{display:flex;gap:7px;flex-wrap:wrap;align-items:center;margin-top:12px}
  .toggle{font-family:var(--mono);font-size:12px;color:var(--mut);background:var(--panel);border:1px solid var(--line);border-radius:7px;padding:6px 10px;cursor:pointer}
  .toggle.on{border-color:var(--wr);color:var(--tx)}
  .head{display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap}
  .h1{font-size:24px;font-weight:600;letter-spacing:-.01em}
  .small{font-size:12px}
  .note{font-family:var(--mono);font-size:11px;color:var(--faint);margin-top:8px;line-height:1.6}
  .err{color:var(--sell);font-family:var(--mono);font-size:12px}
  .ok{color:var(--buy)}
  @media(max-width:760px){.h1{font-size:20px}}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useEffect,useRef,useMemo} = React;
const SLEEP="https://api.sleeper.app/v1";
const POS={QB:"var(--qb)",RB:"var(--rb)",WR:"var(--wr)",TE:"var(--te)"};
const posBg=p=>({QB:"rgba(77,163,255,.15)",RB:"rgba(139,212,80,.15)",WR:"rgba(45,212,167,.15)",TE:"rgba(240,169,75,.15)"}[p]||"rgba(139,150,165,.15)");

async function jget(u){const r=await fetch(u);if(!r.ok)throw new Error(r.status);return r.json();}
function ageFrom(bd){if(!bd)return null;const d=new Date(bd);if(isNaN(d))return null;return (Date.now()-d.getTime())/(365.25*864e5);}
function ageMult(pos,a){
  if(a==null)return 1;
  if(pos==="WR"){if(a<25)return 1.04;if(a<27.5)return 1.01;if(a<29)return .96;if(a<30)return .89;if(a<31)return .81;return .71;}
  if(pos==="RB"){if(a<24)return 1.05;if(a<26)return 1.0;if(a<27)return .91;if(a<28)return .81;if(a<29)return .69;return .57;}
  if(pos==="QB"){if(a<26)return 1.05;if(a<32)return 1.0;if(a<35)return .95;if(a<38)return .87;return .77;}
  if(pos==="TE"){if(a<24)return 1.0;if(a<27)return 1.03;if(a<30)return 1.0;if(a<31)return .91;return .81;}
  return 1;
}
const fmt=n=>n==null?"—":Math.round(n).toLocaleString();
function norm(s){return (s||"").toLowerCase().replace(/[.'’`]/g,"").replace(/\b(jr|sr|ii|iii|iv|v)\b/g,"").replace(/[^a-z ]/g," ").replace(/\s+/g," ").trim();}
function fcVal(byId,byName,p){if(!byId||!p)return null;if(byId[p.player_id])return byId[p.player_id];if(byName){const o=byName[norm(p.full_name)];if(o)return o;}return null;}

function App(){
  const [players,setPlayers]=useState(null);
  const [pStatus,setPStatus]=useState("loading players…");
  const [trending,setTrending]=useState([]);
  const [q,setQ]=useState("");
  const [open,setOpen]=useState(false);
  const [sel,setSel]=useState(null);
  const [view,setView]=useState("player");
  const [depthTeam,setDepthTeam]=useState(null);
  const openDepth=t=>{if(t){setDepthTeam(t);setView("depth");}};
  const [fn,setFn]=useState("val");
  const [fc,setFc]=useState(null);
  const [fcName,setFcName]=useState(null);
  const [fcStatus,setFcStatus]=useState("");
  const [sig,setSig]=useState(null);
  useEffect(()=>{(async()=>{try{const r=await fetch("./data/signal.json");if(r.ok)setSig(await r.json());}catch(e){}})();},[]);
  const [set,setSet]=useState({sf:false,ppr:1,teams:12});
  // league
  const [uname,setUname]=useState("");
  const [season,setSeason]=useState("2025");
  const [leagues,setLeagues]=useState(null);
  const [league,setLeague]=useState(null);
  const [teams,setTeams]=useState(null);
  const [lStatus,setLStatus]=useState("");
  const idx=useRef([]);

  useEffect(()=>{(async()=>{
    try{
      const pm=await jget(`${SLEEP}/players/nfl`);
      setPlayers(pm);setPStatus("");
      idx.current=Object.values(pm)
        .filter(p=>["QB","RB","WR","TE"].includes(p.position)&&p.team&&p.full_name)
        .sort((a,b)=>(a.search_rank||9999)-(b.search_rank||9999));
      try{const ta=await jget(`${SLEEP}/players/nfl/trending/add?limit=18`);
        setTrending(ta.map(t=>({...t,p:pm[t.player_id]})).filter(t=>t.p));}catch(e){}
    }catch(e){setPStatus("could not reach Sleeper — open this file locally or deploy it (CSP can block live fetch inside some embeds)");}
  })();},[]);

  // FantasyCalc values (attempted; honest if blocked)
  useEffect(()=>{(async()=>{
    setFcStatus("loading values…");
    try{
      const u=`https://api.fantasycalc.com/values/current?isDynasty=true&numQbs=${set.sf?2:1}&numTeams=${set.teams}&ppr=${set.ppr}`;
      const d=await jget(u);
      const m={},mn={};
      d.forEach(o=>{if(o.player){if(o.player.sleeperId)m[o.player.sleeperId]=o; if(o.player.name)mn[norm(o.player.name)]=o;}});
      setFc(m);setFcName(mn);setFcStatus("");
    }catch(e){setFc(null);setFcName(null);setFcStatus("values source unreachable from this context — they load once deployed, and chunk 2 replaces them with the backtested model");}
  })();},[set]);

  const sugg=useMemo(()=>{
    if(!q.trim())return [];
    const s=q.toLowerCase();
    return idx.current.filter(p=>p.full_name.toLowerCase().includes(s)).slice(0,8);
  },[q,players]);

  function pick(p){setSel(p);setView("player");setQ("");setOpen(false);}

  async function syncLeagues(){
    setLStatus("finding user…");setLeagues(null);setLeague(null);setTeams(null);
    try{
      const u=await jget(`${SLEEP}/user/${uname.trim()}`);
      if(!u||!u.user_id){setLStatus("no Sleeper user by that name");return;}
      const lg=await jget(`${SLEEP}/user/${u.user_id}/leagues/nfl/${season}`);
      if(!lg.length){setLStatus(`no ${season} leagues for ${uname}`);return;}
      setLeagues(lg);setLStatus("");
    }catch(e){setLStatus("sync failed — check the name/season, or deploy the page");}
  }
  async function loadLeague(lg){
    setLeague(lg);setLStatus("loading rosters…");setTeams(null);
    try{
      const [ros,us]=await Promise.all([jget(`${SLEEP}/league/${lg.league_id}/rosters`),jget(`${SLEEP}/league/${lg.league_id}/users`)]);
      const um={};us.forEach(u=>um[u.user_id]=u);
      const t=ros.map(r=>{
        const owner=um[r.owner_id]||{};
        const val=fc?(r.players||[]).reduce((s,pid)=>{const o=fcVal(fc,fcName,players[pid]);return s+((o&&o.value)||0);},0):null;
        return {rid:r.roster_id,name:(owner.metadata&&owner.metadata.team_name)||owner.display_name||`team ${r.roster_id}`,
          players:r.players||[],w:r.settings?.wins||0,l:r.settings?.losses||0,val};
      });
      if(fc)t.sort((a,b)=>b.val-a.val);
      setTeams(t);setLStatus("");
    }catch(e){setLStatus("could not load league rosters");}
  }

  return (
  <div className="wrap">
    <div className="head" style={{marginBottom:12}}>
      <div>
        <div className="h1">Gridiron <span style={{color:"var(--wr)"}}>Terminal</span></div>
        <div className="note" style={{marginTop:2}}>dynasty · live build · chunk 1 — shell + live data</div>
      </div>
      <div className="mono small mut">{pStatus?<span className="err">{pStatus}</span>:<span className="ok">● sleeper live</span>}</div>
    </div>

    {/* COMMAND BAR */}
    <div className="cmd" onBlur={()=>setTimeout(()=>setOpen(false),140)}>
      <span className="prompt">›</span>
      <input value={q} placeholder="type a player, or click below — e.g. jefferson"
        onChange={e=>{setQ(e.target.value);setOpen(true);}} onFocus={()=>setOpen(true)} />
      {!q && <span className="blink"></span>}
      {open && sugg.length>0 &&
        <div className="drop">
          {sugg.map(p=>(
            <div key={p.player_id} className="opt" onMouseDown={()=>pick(p)}>
              <span className="pos" style={{color:POS[p.position],background:posBg(p.position)}}>{p.position}</span>
              <span style={{fontWeight:500}}>{p.full_name}</span>
              <span className="mono small mut">{p.team}</span>
              <span className="mono small faint" style={{marginLeft:"auto"}}>{ageFrom(p.birth_date)?ageFrom(p.birth_date).toFixed(1)+"y":""}</span>
            </div>
          ))}
        </div>}
    </div>

    {/* function tabs — clickable */}
    <div className="tabs">
      {[["val","value"],["use","usage"],["mkt","market"],["trd","trade"],["comp","comps"],["news","wire"],["sim","season"]].map(([k,d])=>(
        <span key={k} className={"tab"+(fn===k?" on":"")} onClick={()=>setFn(k)}><b>{k}</b> {d}</span>
      ))}
      <span className={"tab"+(view==="league"?" on":"")} style={{marginLeft:"auto"}} onClick={()=>setView(view==="league"?"player":"league")}>
        <b>lg</b> {view==="league"?"close":"my league"}</span>
    </div>

    {/* WIRE */}
    <div className="wire">
      <span className="wdot"></span><span className="lbl" style={{flex:"none"}}>wire · trending adds</span>
      <div style={{overflow:"hidden",flex:1}}>
        <div className="wtrack">
          {(trending.length?[...trending,...trending]:[{player_id:"x",count:0,p:{full_name:"loading live transactions",position:"WR"}}]).map((t,i)=>(
            <span key={i} className="witem" onClick={()=>t.p&&t.p.player_id&&pick(t.p)} style={{cursor:"pointer"}}>
              <b style={{color:POS[t.p.position]||"var(--tx)"}}>{t.p.full_name}</b> +{t.count} adds</span>
          ))}
        </div>
      </div>
    </div>

    {view==="league"
      ? <LeagueView {...{uname,setUname,season,setSeason,syncLeagues,leagues,loadLeague,league,teams,lStatus,fc,players,pick}}/>
      : view==="depth"
      ? <DepthChart {...{team:depthTeam,players,fc,fcName,pick,sel,onBack:()=>setView("player")}}/>
      : <PlayerView {...{sel,fn,fc,fcName,fcStatus,set,setSet,openDepth,sig}}/>}

    <div className="note" style={{marginTop:18,borderTop:"1px solid var(--line)",paddingTop:12}}>
      live now: Sleeper player data, your league sync, the trending wire{fc?", FantasyCalc values + a v0 intrinsic":""}. <br/>
      stubbed for chunk 2 (the python spine): usage/opportunity features, vegas prop-implied points, the revealed-preference trade-solve, and the backtested signal hit-rate.
    </div>
  </div>);
}

function ThinMarket({sel,age}){
  return (
  <div style={{marginTop:12}}>
    <div className="panel pad" style={{borderColor:"var(--line2)"}}>
      <div className="lbl" style={{marginBottom:6}}><span style={{color:"var(--warn)"}}>thin market</span> · no trade-derived value</div>
      <div className="small mut" style={{lineHeight:1.6}}>
        FantasyCalc values come from real trades, so a player the market rarely trades sits below its coverage. That absence is a signal in itself — low liquidity, near-zero crowd consensus.
      </div>
      <div style={{display:"flex",gap:7,flexWrap:"wrap",marginTop:11}}>
        <span className="chip">sleeper rank {sel.search_rank??"—"}</span>
        {sel.depth_chart_order&&<span className="chip">depth #{sel.depth_chart_order}</span>}
        <span className="chip">{sel.position} · {sel.team}</span>
        {age&&<span className="chip">{age.toFixed(1)}y</span>}
      </div>
      <div className="note">this is exactly the gap chunk 2 fills: usage-based intrinsic value and the trade-solve produce a number for fringe players without needing a liquid trade market.</div>
    </div>
  </div>);
}
function DepthChart({team,players,fc,fcName,pick,sel,onBack}){
  const CAP={QB:4,RB:6,WR:7,TE:4};
  const g=useMemo(()=>{
    const out={QB:[],RB:[],WR:[],TE:[]};
    if(!players||!team)return out;
    Object.values(players).forEach(p=>{if(p.team===team&&out[p.position])out[p.position].push(p);});
    Object.keys(out).forEach(k=>out[k].sort((a,b)=>{
      const ao=a.depth_chart_order??99,bo=b.depth_chart_order??99;
      if(ao!==bo)return ao-bo;
      return (a.search_rank||9999)-(b.search_rank||9999);
    }));
    return out;
  },[team,players]);
  return (
  <div style={{marginTop:12}}>
    <div className="head" style={{marginBottom:10}}>
      <div className="mono mut small">depth chart · <span style={{color:"var(--wr)",fontWeight:500}}>{team}</span> · skill positions</div>
      <button className="btn" onClick={onBack}>‹ back to player</button>
    </div>
    <div className="row" style={{gridTemplateColumns:"repeat(auto-fit,minmax(165px,1fr))"}}>
      {["QB","RB","WR","TE"].map(pos=>(
        <div key={pos} className="panel pad">
          <div className="lbl" style={{marginBottom:9,color:POS[pos]}}>{pos}</div>
          {g[pos].slice(0,CAP[pos]).map((p,i)=>{
            const v=fcVal(fc,fcName,p), a=ageFrom(p.birth_date), me=sel&&p.player_id===sel.player_id;
            return (
            <div key={p.player_id} onClick={()=>pick(p)}
              style={{display:"flex",alignItems:"baseline",gap:8,padding:"6px 0",cursor:"pointer",
                borderBottom:i<Math.min(CAP[pos],g[pos].length)-1?"1px solid var(--line)":"none"}}>
              <span className="mono small faint" style={{width:14}}>{i+1}</span>
              <div style={{flex:1,minWidth:0}}>
                <div style={{fontWeight:me?600:400,color:me?"var(--wr)":"var(--tx)",whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis",fontSize:13}}>{p.full_name}</div>
                <div className="mono faint" style={{fontSize:10}}>{a?a.toFixed(1)+"y":""}{p.injury_status?" · "+p.injury_status:""}</div>
              </div>
              {v&&<span className="mono small" style={{color:"var(--mut)"}}>{fmt(v.value)}</span>}
            </div>);
          })}
          {g[pos].length===0&&<div className="mono faint" style={{fontSize:11}}>—</div>}
        </div>
      ))}
    </div>
    <div className="note">built from live Sleeper depth-chart order; values via the same id+name join. click any name to load it. ordering reflects Sleeper's posted depth, not a projection.</div>
  </div>);
}
function PlayerView({sel,fn,fc,fcName,fcStatus,set,setSet,openDepth,sig}){
  const sigP=sig&&sel&&sel.espn_id?sig.players[String(sel.espn_id)]:null;
  const sigMeta=sig&&sig.meta;
  if(!sel) return (
    <div className="panel pad" style={{marginTop:12,textAlign:"center",padding:"42px 16px"}}>
      <div className="mono mut">no player loaded</div>
      <div className="note">type a name in the command bar, or click a name on the wire</div>
    </div>);
  const age=ageFrom(sel.birth_date);
  const v=fcVal(fc,fcName,sel);
  const market=v?v.value:null;
  const trend=v?(v.trend30Day||0):null;
  const mom=market?Math.max(-.15,Math.min(.15,trend/market)):0;
  const intrinsic=market!=null?market*ageMult(sel.position,age)*(1+mom):null;
  const edge=market&&intrinsic?((intrinsic-market)/market*100):null;
  const buy=edge!=null&&edge>3, sell=edge!=null&&edge<-3;

  return (
  <div style={{marginTop:12}}>
    {/* settings */}
    <div className="selset">
      <span className="lbl">league format</span>
      <span className={"toggle"+(set.sf?" on":"")} onClick={()=>setSet({...set,sf:!set.sf})}>{set.sf?"superflex":"1qb"}</span>
      <span className={"toggle"+(set.ppr===1?" on":"")} onClick={()=>setSet({...set,ppr:1})}>ppr</span>
      <span className={"toggle"+(set.ppr===0.5?" on":"")} onClick={()=>setSet({...set,ppr:0.5})}>half</span>
      <span className={"toggle"+(set.teams===12?" on":"")} onClick={()=>setSet({...set,teams:12})}>12-tm</span>
      <span className={"toggle"+(set.teams===10?" on":"")} onClick={()=>setSet({...set,teams:10})}>10-tm</span>
    </div>

    {/* header card */}
    <div className="panel pad" style={{marginTop:12}}>
      <div className="head">
        <div>
          <div style={{fontSize:22,fontWeight:600}}>{sel.full_name}</div>
          <div className="mono small mut" style={{marginTop:4}}>
            <span style={{color:POS[sel.position]}}>{sel.position}</span> · <span onClick={()=>openDepth(sel.team)} style={{cursor:"pointer",color:"var(--wr)",textDecoration:"underline dotted",textUnderlineOffset:3}}>{sel.team}</span> · {age?age.toFixed(1)+"y":"age n/a"} · yoe {sel.years_exp??"—"}
            {sel.injury_status?<span className="err"> · {sel.injury_status}</span>:""}
          </div>
        </div>
        <div style={{display:"flex",gap:7,flexWrap:"wrap"}}>
          {sel.depth_chart_order&&<span className="chip" onClick={()=>openDepth(sel.team)} style={{cursor:"pointer",borderColor:"var(--line2)"}}>depth #{sel.depth_chart_order} ↗</span>}
          {sel.height&&<span className="chip">{sel.height}" {sel.weight}lb</span>}
          {sel.college&&<span className="chip">{sel.college}</span>}
        </div>
      </div>
    </div>

    {/* value metrics */}
    {(fn==="val"||fn==="mkt") && (
      market!=null ? (
      <div>
        <div className="row" style={{gridTemplateColumns:"repeat(3,1fr)"}}>
          <div className="metric"><div className="lbl">market value</div><div className="v">{fmt(market)}</div>
            <div className="mono small" style={{color:trend>=0?"var(--buy)":"var(--sell)",marginTop:3}}>{trend>=0?"▲":"▼"} {fmt(Math.abs(trend))} · 30d</div></div>
          <div className="metric"><div className="lbl">intrinsic · v0</div><div className="v" style={{color:"var(--wr)"}}>{fmt(intrinsic)}</div>
            <div className="mono small faint" style={{marginTop:3}}>age×momentum</div></div>
          <div className="metric"><div className="lbl">edge</div>
            <div className="v" style={{color:buy?"var(--buy)":sell?"var(--sell)":"var(--tx)"}}>{edge>=0?"+":""}{edge.toFixed(1)}%</div>
            <div className="mono small" style={{color:buy?"var(--buy)":sell?"var(--sell)":"var(--mut)",marginTop:3}}>{buy?"lean buy":sell?"lean sell":"fair"}</div></div>
        </div>
        <div className="panel pad" style={{marginTop:12}}>
          <div className="lbl" style={{marginBottom:8}}>market → intrinsic</div>
          <div style={{display:"flex",alignItems:"center",gap:10}}>
            <span className="mono small mut">{fmt(market)}</span>
            <div className="bar" style={{flex:1}}>
              <div style={{width:Math.min(100,Math.max(2,(market/Math.max(market,intrinsic))*100))+"%",background:"var(--faint)"}}></div>
            </div>
            <span className="mono small mut">mkt</span>
          </div>
          <div style={{display:"flex",alignItems:"center",gap:10,marginTop:7}}>
            <span className="mono small" style={{color:"var(--wr)"}}>{fmt(intrinsic)}</span>
            <div className="bar" style={{flex:1}}>
              <div style={{width:Math.min(100,Math.max(2,(intrinsic/Math.max(market,intrinsic))*100))+"%",background:"var(--wr)"}}></div>
            </div>
            <span className="mono small" style={{color:"var(--wr)"}}>intr</span>
          </div>
          <div className="note">v0 intrinsic = market × position age-curve × clamped 30-day momentum. transparent placeholder; chunk 2 swaps in survival-curve aging + the trade-solve, with a backtested hit-rate.</div>
        </div>
      </div>
      ) : (fc ? <ThinMarket sel={sel} age={age}/> : <div className="stub" style={{marginTop:12}}>{fcStatus||"values source unreachable"}</div>)
    )}

    {(fn==="val"||fn==="use") && sigP && (
      <div className="panel pad" style={{marginTop:12,borderColor:sigP.flag==="buy"?"var(--buy)":"var(--line2)"}}>
        <div className="lbl" style={{marginBottom:8}}>usage signal · live · backtested</div>
        <div className="row" style={{gridTemplateColumns:"repeat(3,1fr)",marginTop:0}}>
          <div className="metric"><div className="lbl">usage z · opp</div><div className="v" style={{color:"var(--wr)"}}>{sigP.z_opp>=0?"+":""}{sigP.z_opp}</div></div>
          <div className="metric"><div className="lbl">usage gap</div><div className="v" style={{color:sigP.gap>=0?"var(--buy)":"var(--sell)"}}>{sigP.gap>=0?"+":""}{sigP.gap}</div><div className="mono small faint" style={{marginTop:3}}>opp − scoring</div></div>
          <div className="metric"><div className="lbl">flag</div><div className="v" style={{color:sigP.flag==="buy"?"var(--buy)":"var(--mut)"}}>{sigP.flag||"—"}</div></div>
        </div>
        {sigMeta&&sigMeta.backtest&&(()=>{const yr=Object.keys(sigMeta.backtest).pop();const b=sigMeta.backtest[yr];return (
          <div className="note">backtest {yr}, out-of-sample: top-quartile gap flags improved later at {(b.flag_improve_rate*100).toFixed(1)}% vs {(b.base_improve_rate*100).toFixed(1)}% base. gap &gt; 0 = opportunity running ahead of scoring (a buy lean).</div>);})()}
      </div>
    )}

    {fn==="use" && !sigP && <div className="stub" style={{marginTop:12}}>
      <b>usage · opportunity</b> — chunk 2 (python spine)<br/>
      snap share, route participation, target share, air-yards / aDOT, red-zone touches from nflverse → the lead-indicator panel and the target-depth field viz.</div>}
    {fn==="trd" && <div className="stub" style={{marginTop:12}}>
      <b>trade terminal</b> — chunk 3<br/>
      models a deal on the revealed-preference value scale, weighs each side by contention window + roster need, then builds the decision-ready offer (deep-link out to Sleeper — the public API is read-only).</div>}
    {fn==="comp" && <div className="stub" style={{marginTop:12}}><b>comps</b> — chunk 2 · archetype + value-path nearest neighbours</div>}
    {fn==="news" && <div className="stub" style={{marginTop:12}}><b>player wire</b> — chunk 2 · RSS + injuries + this player's FAAB-bid distribution across leagues</div>}
    {fn==="sim" && <div className="stub" style={{marginTop:12}}><b>season sim</b> — chunk 3 · monte-carlo over your synced schedule + rosters</div>}
  </div>);
}

function LeagueView({uname,setUname,season,setSeason,syncLeagues,leagues,loadLeague,league,teams,lStatus,fc,players,pick}){
  return (
  <div style={{marginTop:12}}>
    <div className="panel pad">
      <div className="lbl" style={{marginBottom:9}}>sync your sleeper league</div>
      <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
        <input className="field" placeholder="sleeper username" value={uname} onChange={e=>setUname(e.target.value)}
          onKeyDown={e=>e.key==="Enter"&&syncLeagues()} style={{flex:"1 1 200px"}}/>
        <input className="field" value={season} onChange={e=>setSeason(e.target.value)} style={{width:90}}/>
        <button className="btn" onClick={syncLeagues}>sync</button>
      </div>
      {lStatus && <div className="note">{lStatus}</div>}
      {!fc && <div className="note">note: roster strength needs the values source (currently unreachable here) — team list + records still load from Sleeper.</div>}
    </div>

    {leagues && !league &&
      <div className="row" style={{gridTemplateColumns:"1fr"}}>
        {leagues.map(lg=>(
          <div key={lg.league_id} className="teamcard" onClick={()=>loadLeague(lg)}>
            <span className="rk">›</span>
            <div style={{flex:1}}><div style={{fontWeight:500}}>{lg.name}</div>
              <div className="mono small mut">{lg.total_rosters} teams · {lg.settings?.type===2?"dynasty":"redraft/keeper"} · {lg.season}</div></div>
          </div>
        ))}
      </div>}

    {league && teams &&
      <div style={{marginTop:12}}>
        <div className="head" style={{marginBottom:8}}>
          <div className="mono mut small">{league.name} · {fc?"power ranking by roster value":"by record"}</div>
          <button className="btn" onClick={()=>loadLeague(null)||window.location.reload()} style={{display:"none"}}></button>
        </div>
        <div className="row" style={{gridTemplateColumns:"1fr"}}>
          {teams.map((t,i)=>{
            const max=fc?Math.max(...teams.map(x=>x.val)):1;
            return (
            <div key={t.rid} className="teamcard" style={{cursor:"default"}}>
              <span className="rk">{i+1}</span>
              <div style={{flex:1,minWidth:0}}>
                <div style={{fontWeight:500,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{t.name}</div>
                <div className="mono small mut">{t.w}-{t.l} · {t.players.length} players</div>
                {fc && <div className="bar" style={{marginTop:6}}><div style={{width:(t.val/max*100)+"%",background:"var(--wr)"}}></div></div>}
              </div>
              {fc && <span className="mono" style={{color:"var(--wr)",fontWeight:500}}>{fmt(t.val)}</span>}
            </div>);
          })}
        </div>
        <div className="note">click a player in the command bar to inspect any name; per-roster drilldown + the trade-finder land in chunk 3.</div>
      </div>}
  </div>);
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
